name: Pull Request Build

on: pull_request

jobs:
  unit-test:
    name: Build and run checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: 17
        cache: 'gradle'
        cache-dependency-path: |
          gradle/libs.versions.toml
          gradle.properties
          settings.gradle
          build.gradle
          */build.gradle
    - name: Cache Gradle wrapper distributions
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper/dists
        key: ${{ runner.os }}-gradle-wrapper-dists-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-dists-
    - name: Cache Android SDK packages
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/lib/android/sdk/build-tools/36.0.0
          /usr/local/lib/android/sdk/platforms/android-36
          /usr/local/lib/android/sdk/platform-tools
          /usr/local/lib/android/sdk/licenses
        key: ${{ runner.os }}-android-sdk-36-36.0.0-v1
        restore-keys: |
          ${{ runner.os }}-android-sdk-
    - name: Gradle - build, test, coverage
      run: |
        echo "::add-matcher::.github/gradle-java-matcher.json"
        echo "::add-matcher::.github/kotlin-error-matcher.json"
        echo "::add-matcher::.github/kotlin-warning-matcher.json"
        ./gradlew check jacocoTestReport --no-daemon \
          --warning-mode all 2>&1 | tee build.log
    - name: Run Danger
      if: always() && github.actor != 'dependabot[bot]'
      uses: danger/kotlin@1.3.4
      with:
        dangerfile: '.github/Dangerfile.df.kts'
        job-id: 'danger-pr'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: '**/build/reports/tests/'
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
