name: Pull Request Build

on: pull_request

jobs:
  unit-test:
    name: Build and run checks
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/.github/Gemfile
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: 17
        cache: 'gradle'
        cache-dependency-path: |
          gradle/libs.versions.toml
          gradle.properties
          settings.gradle
          build.gradle
          */build.gradle
    - name: Cache Gradle wrapper distributions
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper/dists
        key: ${{ runner.os }}-gradle-wrapper-dists-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-dists-
    - name: Cache Android SDK packages
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/lib/android/sdk/build-tools/36.0.0
          /usr/local/lib/android/sdk/platforms/android-35
          /usr/local/lib/android/sdk/platform-tools
          /usr/local/lib/android/sdk/licenses
        key: ${{ runner.os }}-android-sdk-35-36.0.0-v1
        restore-keys: |
          ${{ runner.os }}-android-sdk-
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true
#    - name: Cache Gradle
#      if: always()
#      uses: actions/cache@v1.2.0
#      with:
#        path: |
#          ~/.gradle/caches/
#          ~/.gradle/wrapper/
#        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
#        restore-keys: |
#          ${{ runner.os }}-gradle-
#    - name: Cache gems
#      if: always()
#      uses: actions/cache@v1.2.0
#      with:
#        path: vendor/bundle
#        key: ${{ runner.os }}-gems-${{ hashFiles('.github/Gemfile') }}
#        restore-keys: |
#          ${{ runner.os }}-gems-
    - name: Gradle - build, test, coverage
      run: |
        echo "::add-matcher::.github/gradle-java-matcher.json"
        echo "::add-matcher::.github/kotlin-error-matcher.json"
        echo "::add-matcher::.github/kotlin-warning-matcher.json"
        ./gradlew check jacocoTestReport --no-daemon -Dorg.gradle.daemon=false
    - name: Run Danger
      if: always()
      uses: MeilCli/danger-action@v6
      with:
        plugins_file: '.github/Gemfile'
        install_path: 'vendor/bundle'
        danger_file: '.github/Dangerfile'
        danger_id: 'danger-pr'
      env:
        DANGER_GITHUB_API_TOKEN: ${{ secrets.DANGER_GITHUB_TOKEN }}
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: '**/build/reports/tests/'
    - name: Trigger Codecov
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      run: bash <(curl -s https://codecov.io/bash)
