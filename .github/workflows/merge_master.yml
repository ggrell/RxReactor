name: Master Snapshot Build

on: 
  push:
    branches:
      - main

jobs:
  build:
    name: Build, run checks, release SNAPSHOT to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: 17
        cache: 'gradle'
        cache-dependency-path: |
          gradle/libs.versions.toml
          gradle.properties
          settings.gradle
          build.gradle
          */build.gradle
    - name: Cache Gradle wrapper distributions
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper/dists
        key: ${{ runner.os }}-gradle-wrapper-dists-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-dists-
    - name: Configure Android SDK path
      run: |
        echo "ANDROID_SDK_ROOT=${RUNNER_TEMP}/android-sdk" >> "${GITHUB_ENV}"
        echo "ANDROID_HOME=${RUNNER_TEMP}/android-sdk" >> "${GITHUB_ENV}"
    - name: Cache Android SDK packages
      id: android-sdk-cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/android-sdk
        key: ${{ runner.os }}-android-sdk-36-36.0.0-v2
        restore-keys: |
          ${{ runner.os }}-android-sdk-
    - name: Install Android SDK packages
      if: steps.android-sdk-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p "${ANDROID_SDK_ROOT}"
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" \
          "platform-tools" \
          "platforms;android-36" \
          "build-tools;36.0.0"
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
        bundler-cache: true
    - name: Assemble release
      run: |
        echo "::add-matcher::.github/gradle-java-matcher.json"
        echo "::add-matcher::.github/kotlin-error-matcher.json"
        echo "::add-matcher::.github/kotlin-warning-matcher.json"
        ./gradlew clean assembleRelease --no-daemon
    - name: Run all checks and create coverage report
      run: |
        ./gradlew check jacocoTestReport --no-daemon
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      continue-on-error: true
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Publish to Maven Central Snapshots repo
      env:
        OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
        OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      run: |
        ./gradlew publishAllPublicationsToMavenCentralSnapshotsRepository
