plugins {
    id "com.android.library"
    id "jacoco"
    alias libs.plugins.dokka.javadoc.plugin
    id "maven-publish"
}

apply from: "$rootDir/gradle/library-artifacts.gradle"
//apply from: "$rootDir/gradle/jacoco-android.gradle"

android {
    compileSdk buildConfig.compileSdk

    defaultConfig {
        namespace 'com.gyurigrell.rxreactor2.android'
        minSdk buildConfig.minSdk
        targetSdk buildConfig.targetSdk

        testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"

    }

    buildTypes {
        debug {
            enableUnitTestCoverage = true
        }

        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    lint {
        abortOnError false
        baseline file('lint-baseline.xml')
    }

    publishing {
        singleVariant("release") {
            withSourcesJar()
        }
    }
}

dependencies {
    api project(path: ':rxreactor2')

    api libs.rx2.java
    implementation libs.rx2.android

//    testImplementation libs.junit
}

tasks.withType(Test).configureEach {
    jacoco.includeNoLocationClasses = true
}

tasks.register('javadocJar', Jar) {
    def dokkaTask = tasks.named('dokkaGeneratePublicationJavadoc')
    dependsOn dokkaTask
    archiveClassifier = "javadoc"
    from dokkaTask.flatMap { it.outputDirectory }
}

afterEvaluate {
    publishing {
        publications {
            RxReactor2Android(MavenPublication) {
                groupId = project.group
                artifactId = project.name

                from components.release
                artifact javadocJar

                pom {
                    name = "RxReactor (RxJava 2) for Android"
                    description = "A Kotlin framework for a reactive and unidirectional RxJava 2 application architecture"
                    url = POM_URL

                    licenses {
                        license {
                            name = POM_LICENSE_NAME
                            url = POM_LICENSE_URL
                        }
                    }

                    developers {
                        developer {
                            id = POM_DEVELOPER_ID
                            name = POM_DEVELOPER_NAME
                            email = POM_DEVELOPER_EMAIL
                        }
                    }

                    scm {
                        connection = POM_SCM_CONNECTION
                        developerConnection = POM_SCM_CONNECTION
                        url = POM_SCM_URL
                    }
                }
            }
        }
    }

    signing {
        def signingKeyId = findProperty("signingKeyId")
        def signingKey = findProperty("signingKey")
        def signingPassword = findProperty("signingPassword")
        useInMemoryPgpKeys(signingKeyId, signingKey, signingPassword)

        sign publishing.publications
    }

    tasks.withType(Sign).configureEach {
        onlyIf { findProperty("signingKey") != null }
    }
}
